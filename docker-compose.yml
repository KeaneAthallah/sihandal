services:
  mysql:
    image: mysql:8.0
    container_name: sihandal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-sihandal}
      MYSQL_USER: ${DB_USERNAME:-sihandal}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sihandal-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: https://sihandal.online
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sihandal}
      DB_USERNAME: ${DB_USERNAME:-sihandal}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    container_name: sihandal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl/sihandal.pem:/etc/ssl/certs/sihandal.pem:ro
      - ./docker/ssl/sihandal-key.pem:/etc/ssl/private/sihandal-key.pem:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app

volumes:
  mysql_data:
  app_storage:
  nginx_logs:
